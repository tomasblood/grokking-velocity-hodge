name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install analysis package
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Compile
        run: python -m compileall -q src reproducibility
      - name: Test numerical and real Hodge calibration paths
        run: python -m unittest discover -s reproducibility/tests -v
      - name: Dry-run the analysis pipeline
        env:
          DRY_RUN: "true"
          VERIFY_OUTPUTS: "false"
          THESIS_DATA_ROOT: ${{ runner.temp }}/grokking-ci
        run: python reproducibility/Grokking/Pipelines/main_charts.py
